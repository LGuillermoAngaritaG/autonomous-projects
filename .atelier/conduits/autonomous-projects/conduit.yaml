name: autonomous-projects
description: >
  Advance the single project living in a target repo's .atelier/project/ folder.
  Point the conduit at the repo via the project_root input; the codebase workers
  edit is that same repo. The project has a project.md (YAML frontmatter) and
  numbered stage folders (00_backlog, 00_tasks, 00_abandoned holds rejected
  ideas, 01_to-do, 02_in-progress, 03_to-review, 04_done; 05_blocked holds
  tasks the review loop gave up on, awaiting a human). You say how many of each activity to
  run this tick (n_ideas/n_reviews/n_improve/n_todo); the only gate is a usage
  ceiling (max_usage) read from each activity's harness. An activity is skipped
  when its n_* is 0 or its harness is at/over max_usage.

timeout: 7200
max_concurrency: 1

inputs:
  project_root: "Absolute path to the target repo holding .atelier/project/ (required); the codebase workers edit."
  n_ideas: {default: "0"}      # ideas to generate this tick (0 = skip)
  n_reviews: {default: "0"}    # reviews to generate this tick
  n_improve: {default: "0"}    # raw tasks to spec from 00_tasks/ this tick
  n_todo: {default: "0"}       # to-do tasks to advance this tick
  max_usage: {default: "80"}   # usage ceiling %; an activity is skipped if its harness is at/over this

tasks:
  - dep_guard:
      description: Fail fast if uv, the claude CLI, or python3 is missing from PATH.
      tool: tool:bash
      depends_on: []
      task: |
        set -euo pipefail
        missing=()
        command -v uv >/dev/null 2>&1 \
          || missing+=("uv — install: curl -LsSf https://astral.sh/uv/install.sh | sh")
        command -v claude >/dev/null 2>&1 \
          || missing+=("claude (harness:claude-code) — must be on PATH")
        command -v python3 >/dev/null 2>&1 \
          || missing+=("python3 — must be on PATH (runs usage checks + per-tick counters)")
        if ((${#missing[@]})); then
          printf 'missing dependency: %s\n' "${missing[@]}" | sort -u >&2
          exit 1
        fi
        printf 'deps ok\n'

  - counts:
      description: "Echo the per-tick counts so each branch can gate on n_* > 0 (depends_on can't read inputs directly)."
      tool: tool:bash
      depends_on: [dep_guard]
      task: |
        printf 'n_ideas: %s\nn_reviews: %s\nn_improve: %s\nn_todo: %s\n' \
          "{{inputs.n_ideas}}" "{{inputs.n_reviews}}" "{{inputs.n_improve}}" "{{inputs.n_todo}}"

  - usage_ideas:
      description: "ok: true if generate-idea's harness is under max_usage (fail-open)."
      tool: tool:bash
      depends_on: ['counts.output.match(n_ideas:\s*[1-9])']
      task: |
        python3 {{conduit_dir}}/scripts/usage_check.py --conduit generate-idea --max-usage "{{inputs.max_usage}}"

  - usage_reviews:
      description: "ok: true if generate-review's harness is under max_usage (fail-open)."
      tool: tool:bash
      depends_on: ['counts.output.match(n_reviews:\s*[1-9])']
      task: |
        python3 {{conduit_dir}}/scripts/usage_check.py --conduit generate-review --max-usage "{{inputs.max_usage}}"

  - usage_improve:
      description: "ok: true if improve-task's harness is under max_usage (fail-open)."
      tool: tool:bash
      depends_on: ['counts.output.match(n_improve:\s*[1-9])']
      task: |
        python3 {{conduit_dir}}/scripts/usage_check.py --conduit improve-task --max-usage "{{inputs.max_usage}}"

  - usage_todo:
      description: "ok: true if work-one-todo's harness is under max_usage (fail-open)."
      tool: tool:bash
      depends_on: ['counts.output.match(n_todo:\s*[1-9])']
      task: |
        python3 {{conduit_dir}}/scripts/usage_check.py --conduit work-one-todo --max-usage "{{inputs.max_usage}}"

  - generate_ideas:
      description: Generate up to n_ideas ideas into the project's 00_backlog/ folder.
      tool: tool:conduit
      task: generate-idea
      depends_on:
        - 'counts.output.match(n_ideas:\s*[1-9])'
        - 'usage_ideas.output.match(ok:\s*true)'
      repeat: 50  # literal safety ceiling; the sub-conduit's counter stops at n_ideas
      until: 'output.match(remaining:\s*0)'
      inputs:
        target: "{{inputs.n_ideas}}"
        prior: "{{loop.previous}}"
        project_document: "{{inputs.project_root}}/.atelier/project/project.md"
        template_dir: "{{conduit_dir}}/references"
        path_idea: "{{inputs.project_root}}/.atelier/project/00_backlog"
        bad_ideas: "{{inputs.project_root}}/.atelier/project/00_abandoned"
        tasks_dir: "{{inputs.project_root}}/.atelier/project"

  - generate_reviews:
      description: Generate up to n_reviews reviews into the project's 00_backlog/ folder.
      tool: tool:conduit
      task: generate-review
      depends_on:
        - 'counts.output.match(n_reviews:\s*[1-9])'
        - 'usage_reviews.output.match(ok:\s*true)'
      repeat: 50  # literal safety ceiling; the sub-conduit's counter stops at n_reviews
      until: 'output.match(remaining:\s*0)'
      inputs:
        target: "{{inputs.n_reviews}}"
        prior: "{{loop.previous}}"
        project_document: "{{inputs.project_root}}/.atelier/project/project.md"
        template_dir: "{{conduit_dir}}/references"
        path_review: "{{inputs.project_root}}/.atelier/project/00_backlog"
        bad_ideas: "{{inputs.project_root}}/.atelier/project/00_abandoned"
        tasks_dir: "{{inputs.project_root}}/.atelier/project"

  - improve_tasks:
      description: Spec up to n_improve raw tasks from 00_tasks/ into task_*.md in 00_backlog/.
      tool: tool:conduit
      task: improve-task
      depends_on:
        - 'counts.output.match(n_improve:\s*[1-9])'
        - 'usage_improve.output.match(ok:\s*true)'
      repeat: 50  # literal safety ceiling; stops at n_improve or when the inbox drains
      until: 'output.match(remaining:\s*0|task_counter:\s*0)'
      inputs:
        target: "{{inputs.n_improve}}"
        prior: "{{loop.previous}}"
        project_document: "{{inputs.project_root}}/.atelier/project/project.md"
        template_dir: "{{conduit_dir}}/references"
        path_task: "{{inputs.project_root}}/.atelier/project/00_tasks"
        path_backlog: "{{inputs.project_root}}/.atelier/project/00_backlog"

  - do_tasks:
      description: Advance up to n_todo to-do tasks, each fully to a DONE verdict.
      tool: tool:conduit
      task: work-one-todo
      depends_on:
        - 'counts.output.match(n_todo:\s*[1-9])'
        - 'usage_todo.output.match(ok:\s*true)'
      repeat: 50  # literal safety ceiling; stops at n_todo or when the queue drains
      until: 'output.match(remaining:\s*0|task_counter:\s*0)'
      inputs:
        target: "{{inputs.n_todo}}"
        prior: "{{loop.previous}}"
        project_document: "{{inputs.project_root}}/.atelier/project/project.md"
        project_dir: "{{inputs.project_root}}/.atelier/project"
        project_root: "{{inputs.project_root}}"
