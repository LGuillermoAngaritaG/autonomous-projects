name: autonomous-projects
description: >
  Pick the highest-priority idle project from this conduit's own project
  folders and advance it via Claude Code. Projects live in projects/working/,
  tasks in tasks/<name>/ with kanban folders (to-do, in-progress,
  in-review, done). projects/paused/ holds projects the human wants
  skipped. If no project is eligible, emit SKIP and short-circuit.

timeout: 7200
max_concurrency: 3

inputs:
  idle_hours:
    description: >-
      Project must have been untouched (no git commit or file edit under
      `location`) for at least this many hours.
    default: "0.1"
  max_usage_cc:
    default: "80"
  max_usage_codex:
    default: "95"
  max_usage_opencode:
    default: "85"
  harness_ideation: cc
  harness_development: opencode
  harness_review: codex

tasks:
  - get_projects_dir:
      description: Ensure the run directory's project/task folders exist and emit its path.
      tool: tool:bash
      depends_on: []
      task: |
        set -euo pipefail
        mkdir -p projects/working projects/paused tasks
        printf '%s' "$(pwd -P)"

  - pick_project:
      description: Decide which project (if any) to work on this tick.
      tool: tool:bash
      depends_on: [get_projects_dir]
      task: |
        set -euo pipefail
        python3 {{conduit_dir}}/scripts/project_picker.py \
          --projects-dir "{{get_projects_dir.output}}" \
          --idle-hours "{{inputs.idle_hours}}"
  - gate:
      description: Emit per-tick gates (generate_idea / generate_review / work_on_to_do) for the picked project.
      tool: tool:bash
      depends_on:
        - get_projects_dir
        - "pick_project.output.not_match(^SKIP)"
      task: |
        set -euo pipefail
        name="$(printf '%s' '{{pick_project.output}}')"
        python3 {{conduit_dir}}/scripts/project_state.py \
          --projects-dir "{{get_projects_dir.output}}" \
          --name "$name" \
          --max-usage-cc "{{inputs.max_usage_cc}}" \
          --max-usage-codex "{{inputs.max_usage_codex}}" \
          --max-usage-opencode "{{inputs.max_usage_opencode}}" \
          --harness-ideation "{{inputs.harness_ideation}}" \
          --harness-development "{{inputs.harness_development}}" \
          --harness-review "{{inputs.harness_review}}"

  - generate_idea:
      description: Generate one idea into the project's ideas/ folder.
      tool: tool:conduit
      task: generate-idea
      depends_on:
        - "gate.output.match(generate_idea: true)"
      inputs:
        project_document: "{{get_projects_dir.output}}/working/{{pick_project.output}}.md"
        template_dir: "{{conduit_dir}}/references"
        path_idea: "{{get_projects_dir.output}}/tasks/{{pick_project.output}}/backlog"
        bad_ideas: "{{get_projects_dir.output}}/tasks/{{pick_project.output}}/abandoned"
        tasks_dir: "{{get_projects_dir.output}}/tasks/{{pick_project.output}}"

  - generate_review:
      description: Generate one review into the project's backlog/ folder.
      tool: tool:conduit
      task: generate-review
      depends_on:
        - "gate.output.match(generate_review: true)"
      inputs:
        project_document: "{{get_projects_dir.output}}/working/{{pick_project.output}}.md"
        template_dir: "{{conduit_dir}}/references"
        path_review: "{{get_projects_dir.output}}/tasks/{{pick_project.output}}/backlog"
        bad_ideas: "{{get_projects_dir.output}}/tasks/{{pick_project.output}}/abandoned"
        tasks_dir: "{{get_projects_dir.output}}/tasks/{{pick_project.output}}"

  - work_task:
      description: Advance one existing to-do task, looping until a DONE verdict.
      tool: tool:conduit
      task: task-with-review
      depends_on:
        - "gate.output.match(work_on_to_do: true)"
      repeat: 10
      until: 'output.match(VERDICT:\s*DONE)'
      inputs:
        task: |
          You are advancing an autonomous project tracked in a folder-structured project directory.

          Reviewer feedback from your previous attempt this run (empty on the
          first iteration):
          {{loop.previous}}

          If that feedback is a NOT_DONE verdict, treat its REASON as the
          priority signal — address what the reviewer flagged before doing
          anything else.

          The project markdown file is at: {{get_projects_dir.output}}/working/{{pick_project.output}}.md
          You can extract the tasks_path from this output: {{gate.output}}

          Do the following:
          1. Read the project markdown file. Parse the YAML frontmatter (priority,
             location, use_git), the `# Goal` section, and the `# Constraints` section if
             present. Treat this file as READ-ONLY: it is owned by the human. Never edit it.
             The constraints are binding — every task you execute must respect them. If a
             constraint blocks the obvious next step or names a decision only the human can
             make, do not work around it: record the conflict in the task's
             `# How was done and tested`.
          2. For memory of what has already happened, skim the task files in `done/` and
             `in-review/` — their `# Description` and `# How was done and tested` sections
             record past work. Use them to avoid repeating work already completed or awaiting review.
          3. If in-progress/ has a .md file, resume it — skip to step 5 to finish that task.
          4. Otherwise pick the top .md file in to-do/. This is the task to work on. Do NOT
             propose or create new tasks — only existing to-do/in-progress tasks are executed.
             If both to-do/ and in-progress/ are empty, output "NOTHING TO DO" and stop.
             Move the chosen file from to-do/ to in-progress/.
          5. Read the task file. The `# Description` section tells you what to do.
          6. cd into the project's `location` directory from the frontmatter.
          7. Do the work. Respect `use_git`: if true, commit changes with a clear message;
             if false, just edit files.
          8. Validation gate (mandatory before moving the task): run the project's FULL
             automated test suite (e.g. `uv run pytest`), not only the tests you added.
             Record the exact pass/fail counts in `# How was done and tested`. The suite MUST be
             green before you move the task. If it is red, fix the regression or revert your
             change — never move a task that leaves tests failing. Do NOT dismiss failures as
             "pre-existing" unless you have proven it against the committed baseline: `git
             stash` does NOT revert committed code, so it cannot establish a baseline. To
             check, compare against HEAD before your own commits (e.g. `git stash` is invalid
             here; use `git checkout <pre-work-commit> -- . ` in a scratch worktree, or run
             the suite on a clean clone) — when unsure, assume the failure is yours.
          9. When finished, update the task file: fill in the frontmatter (`datetime`
             — the completion date AND time, e.g. the output of
             `date '+%Y-%m-%d %H:%M:%S %Z'`; `location` (local path or PR URL);
             `commits`) and the `# How was done and tested` section describing how you verified
             the work. Then move the file from in-progress/ to in-review/. Never move
             tasks to done/ — that is reserved for the human reviewer.
