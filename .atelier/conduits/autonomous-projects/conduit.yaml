name: autonomous-projects
description: >
  Pick the highest-priority idle project from this conduit's own project
  folders and advance it. Projects live in projects/<name>/ with a project.md
  (YAML frontmatter, state: working|paused) and numbered stage folders
  (00_backlog, 00_tasks, 01_to-do, 02_in-progress, 03_to-review, 04_done).
  The gates picker reports how much work each bucket has left; each branch
  runs only while its bucket is non-empty and the harness is under its usage
  ceiling. If no project is eligible, every bucket reads 0 and the tick
  short-circuits.

timeout: 7200
max_concurrency: 3

inputs:
  max_usage_cc: {default: "80"}
  max_usage_codex: {default: "95"}
  max_usage_opencode: {default: "85"}
  idle_hours: {default: "0.1"}
  harness_ideation: {default: "cc"}
  harness_development: {default: "opencode"}
  harness_review: {default: "codex"}
  # Declared for parity with config.yaml; not yet wired to any branch.
  automatic_to_do_task: {default: "true"}
  automatic_to_do_review: {default: "false"}
  automatic_to_do_idea: {default: "false"}
  # max_per_tick_* are mirrored as literal `repeat:` on the matching task
  # (the engine cannot template repeat). Kept here as the human-facing record.
  max_per_tick_improve_task: {default: "5"}
  max_per_tick_generate_review: {default: "1"}
  max_per_tick_generate_idea: {default: "1"}
  max_per_tick_to_do: {default: "5"}

tasks:
  - dep_guard:
      description: Fail fast if uv or a configured harness CLI is missing from PATH.
      tool: tool:bash
      depends_on: []
      task: |
        set -euo pipefail
        missing=()
        command -v uv >/dev/null 2>&1 \
          || missing+=("uv — install: curl -LsSf https://astral.sh/uv/install.sh | sh")
        for h in "{{inputs.harness_ideation}}" "{{inputs.harness_development}}" "{{inputs.harness_review}}"; do
          case "$h" in
            cc)       bin=claude ;;
            codex)    bin=codex ;;
            opencode) bin=opencode ;;
            *)        bin="$h" ;;
          esac
          command -v "$bin" >/dev/null 2>&1 \
            || missing+=("$bin (harness '$h') — must be on PATH")
        done
        if ((${#missing[@]})); then
          printf 'missing dependency: %s\n' "${missing[@]}" | sort -u >&2
          exit 1
        fi
        printf 'deps ok\n'

  - get_projects_dir:
      description: Ensure the run directory's projects/ folder exists and emit its path.
      tool: tool:bash
      depends_on: [dep_guard]
      task: |
        set -euo pipefail
        mkdir -p projects
        printf '%s' "$(pwd -P)"

  - pick:
      description: Pick the project and report per-bucket work left (gates).
      tool: tool:bash
      depends_on: [get_projects_dir]
      task: |
        set -euo pipefail
        mins="$(python3 -c 'print({{inputs.idle_hours}} * 60)')"
        uv run --project {{conduit_dir}}/gates \
          python {{conduit_dir}}/gates/main.py \
          "{{get_projects_dir.output}}/projects" \
          --min-idle-minutes "$mins"

  - pick_name:
      description: Extract the bare project name from the gates block (empty when none).
      tool: tool:bash
      depends_on: [pick]
      task: |
        set -euo pipefail
        # ponytail: single-quoting the block is safe (gates names never contain ').
        # Wrap in $(...) to strip the trailing newline sed's `p` emits — otherwise
        # the name carries a \n that corrupts every downstream path built from this
        # task's output (awk/find then fail on the broken path, killing the tick).
        printf '%s' "$(printf '%s' '{{pick.output}}' \
          | sed -n 's/^project_name: "\(.*\)"$/\1/p')"

  - validate_config:
      description: Warn-only sanity check of config.yaml and run inputs (never blocks).
      tool: tool:bash
      depends_on: [get_projects_dir]
      task: |
        set -euo pipefail
        python3 {{conduit_dir}}/scripts/validate_config.py \
          --config-path "{{conduit_dir}}/config.yaml" \
          --max-usage-cc "{{inputs.max_usage_cc}}" \
          --max-usage-codex "{{inputs.max_usage_codex}}" \
          --max-usage-opencode "{{inputs.max_usage_opencode}}" \
          --idle-hours "{{inputs.idle_hours}}" \
          --harness-ideation "{{inputs.harness_ideation}}" \
          --harness-development "{{inputs.harness_development}}" \
          --harness-review "{{inputs.harness_review}}" \
          --automatic-to-do-task "{{inputs.automatic_to_do_task}}" \
          --automatic-to-do-review "{{inputs.automatic_to_do_review}}" \
          --automatic-to-do-idea "{{inputs.automatic_to_do_idea}}" \
          --max-per-tick-improve-task "{{inputs.max_per_tick_improve_task}}" \
          --max-per-tick-generate-review "{{inputs.max_per_tick_generate_review}}" \
          --max-per-tick-generate-idea "{{inputs.max_per_tick_generate_idea}}" \
          --max-per-tick-to-do "{{inputs.max_per_tick_to_do}}"

  - usage_gate:
      description: Emit per-role usage-throttle flags (ideation/development/review _ok).
      tool: tool:bash
      depends_on: [get_projects_dir]
      task: |
        set -euo pipefail
        python3 {{conduit_dir}}/scripts/usage_gate.py \
          --max-usage-cc "{{inputs.max_usage_cc}}" \
          --max-usage-codex "{{inputs.max_usage_codex}}" \
          --max-usage-opencode "{{inputs.max_usage_opencode}}" \
          --harness-ideation "{{inputs.harness_ideation}}" \
          --harness-development "{{inputs.harness_development}}" \
          --harness-review "{{inputs.harness_review}}"

  - generate_idea:
      description: Generate one idea into the project's 00_backlog/ folder.
      tool: tool:conduit
      task: generate-idea
      depends_on:
        - pick_name
        - "pick.output.match(ideas_left: [1-9])"
        - "usage_gate.output.match(ideation_ok: true)"
      # repeat = max_per_tick_generate_idea (config.yaml). The engine can't
      # template repeat. To raise the per-tick cap, set repeat > 1 AND add
      #   until: 'output.match(remaining:\s*0)'
      # (the generate-idea count_remaining tail already emits it) so the loop
      # stops at the project's max_ideas cap.
      repeat: 20
      until: 'output.match(remaining:\s*0)'
      inputs:
        project_document: "{{get_projects_dir.output}}/projects/{{pick_name.output}}/project.md"
        template_dir: "{{conduit_dir}}/references"
        path_idea: "{{get_projects_dir.output}}/projects/{{pick_name.output}}/00_backlog"
        bad_ideas: "{{get_projects_dir.output}}/projects/{{pick_name.output}}/00_abandoned"
        tasks_dir: "{{get_projects_dir.output}}/projects/{{pick_name.output}}"

  - generate_review:
      description: Generate one review into the project's 00_backlog/ folder.
      tool: tool:conduit
      task: generate-review
      depends_on:
        - pick_name
        - "pick.output.match(reviews_left: [1-9])"
        - "usage_gate.output.match(ideation_ok: true)"
      # repeat = max_per_tick_generate_review (config.yaml). To raise the
      # per-tick cap, set repeat > 1 AND add
      #   until: 'output.match(remaining:\s*0)'
      # (the generate-review count_remaining tail already emits it).
      repeat: 15
      until: 'output.match(remaining:\s*0)'
      inputs:
        project_document: "{{get_projects_dir.output}}/projects/{{pick_name.output}}/project.md"
        template_dir: "{{conduit_dir}}/references"
        path_review: "{{get_projects_dir.output}}/projects/{{pick_name.output}}/00_backlog"
        bad_ideas: "{{get_projects_dir.output}}/projects/{{pick_name.output}}/00_abandoned"
        tasks_dir: "{{get_projects_dir.output}}/projects/{{pick_name.output}}"

  - improve_task:
      description: Drain the project's 00_tasks/ inbox into spec'd task_*.md in 00_backlog/.
      tool: tool:conduit
      task: improve-task
      depends_on:
        - pick_name
        - "pick.output.match(to_improve_left: [1-9])"
        - "usage_gate.output.match(ideation_ok: true)"
      # repeat = max_per_tick_improve_task (config.yaml). improve-task drains one
      # inbox file per run and emits task_counter; until stops when it hits 0.
      repeat: 15
      until: 'output.match(task_counter:\s*0)'
      inputs:
        project_document: "{{get_projects_dir.output}}/projects/{{pick_name.output}}/project.md"
        template_dir: "{{conduit_dir}}/references"
        path_task: "{{get_projects_dir.output}}/projects/{{pick_name.output}}/00_tasks"
        path_backlog: "{{get_projects_dir.output}}/projects/{{pick_name.output}}/00_backlog"

  - work_task:
      description: Advance up to max_per_tick_to_do to-do tasks, each fully to DONE.
      tool: tool:conduit
      task: work-one-todo
      depends_on:
        - pick_name
        - "pick.output.match(to_do_left: [1-9])"
        - "usage_gate.output.match(development_ok: true)"
        - "usage_gate.output.match(review_ok: true)"
      # repeat = max_per_tick_to_do (config.yaml). work-one-todo advances one
      # task to DONE per run and emits task_counter; until stops when 01_to-do
      # drains. The inner DONE-loop lives in the work-one-todo conduit.
      repeat: 15
      until: 'output.match(task_counter:\s*0)'
      inputs:
        project_document: "{{get_projects_dir.output}}/projects/{{pick_name.output}}/project.md"
        project_dir: "{{get_projects_dir.output}}/projects/{{pick_name.output}}"
