# Per-tick cap mirror — the engine honors only the literal `repeat:` on each
# conduit task. To change a cap, edit the `repeat:` line in conduit.yaml, then
# update both values here to match. Name map: conduit task `work_task` ↔ key `to_do`.
max_per_tick:
  improve_task: 15
  generate_review: 15
  generate_idea: 20
  to_do: 15