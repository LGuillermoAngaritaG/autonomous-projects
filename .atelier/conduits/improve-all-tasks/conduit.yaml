name: improve-all-tasks
description: "Drain the task inbox by calling improve-task once per task until the inbox is empty (task_counter: 0)."

timeout: 7200
max_concurrency: 1

inputs:
  project_document: "Path to the project document improve-task grounds each task in."
  template_dir: "Directory holding task_template.md, threaded through to improve-task."
  path_task: "Folder where the user drops raw task files to improve (the task inbox)."
  path_backlog: "Target folder where improved task_*.md documents are written."
  target: {default: "20"}  # made-counter cap; keep >= repeat so the inbox-drain is the real stop

tasks:
  - improve_all_tasks:
      description: "Loop the improve-task conduit — one inbox task per iteration — until its counter reports task_counter: 0."
      tool: tool:conduit
      task: improve-task
      depends_on: []
      repeat: 20
      until: 'output.match(remaining:\s*0|task_counter:\s*0)'
      inputs:
        project_document: "{{inputs.project_document}}"
        template_dir: "{{inputs.template_dir}}"
        path_task: "{{inputs.path_task}}"
        path_backlog: "{{inputs.path_backlog}}"
        target: "{{inputs.target}}"
        prior: "{{loop.previous}}"
