name: improve-task
description: "Drain a project's task inbox — for each raw task the user dropped in the tasks folder, generate a spec and a plan, then store it as a priority-1 task_*.md in the backlog."
timeout: 7200
max_concurrency: 1

inputs:
  project_document: "Path to the project document (goal/constraints/context) the agent reads to ground each task."
  template_dir: "Directory holding task_template.md (threaded from the parent conduit)."
  path_task: "Folder where the user drops raw task files to improve (the task inbox)."
  path_backlog: "Target folder where the improved task_*.md documents are written."

tasks:
  - improve_task:
      description: Improve a task provided by the user.
      tool: harness:claude-code
      depends_on: []
      retries: 2
      retry_backoff: 5
      task: |
        /spec

        Read this project document first to understand the project's goal and
        constraints, and ground your improvements in it:
        {{inputs.project_document}}

        Then focus on the codebase at the path outlined in the project document.

        Your job is to take a task from the user's task inbox at {{inputs.path_task}} 
        and generate an improved version of it without changing its core meaning or intent.

        Produce exactly ONE improved version of the task.

        Output format (strict):
        - Do all exploration and reasoning first; NONE of that narration may
          appear in the final output.
        - Emit the improved task between the two marker lines below, on their
          own lines, with ONLY the improved task content in between:

          ===TASK START===
          ===TASK END===

        - After the END marker, output one final line naming the task
          (lowercase, kebab-case, no spaces):

          TASK_SLUG: <kebab-case-name>

  - generate_plan:
      description: Produce a plan for the generated task, inline only.
      tool: harness:claude-code
      depends_on: [improve_task]
      retries: 2
      retry_backoff: 5
      task: |
        /plan

        Create a plan for the following task (use only the text between the
        "===TASK START===" / "===TASK END===" markers; ignore everything else):

        ---
        {{improve_task.output}}
        ---

        IMPORTANT: Output the full plan inline in your response only. Do NOT write
        the plan to any file on disk.

        Output format (strict):
        - Do all reasoning first; NONE of that narration may appear in the plan.
        - Emit the plan between the two marker lines below, with ONLY the plan in
          between (no preamble, no narration). Do not put a top-level "# Plan"
          heading inside; use "##" for any section headings:
          ===PLAN START===
          ===PLAN END===

  - store_task:
      description: Assemble the task document from the template and write it to path_backlog.
      tool: harness:claude-code
      depends_on: [improve_task, generate_plan]
      retries: 2
      retry_backoff: 5
      task: |
        Create one task document and write it to disk.

        1. Read the template at:
           {{inputs.template_dir}}/task_template.md
           It has frontmatter plus the sections "# Description", "# Plan",
           "# User comments", "# What was done", "# How was done and tested".

        2. Fill the sections:
           - "# Description": Original user task
           - "# Spec": ONLY the text between the "===TASK START===" and
             "===TASK END===" markers in the task below. Discard everything
             outside the markers (model narration, the markers themselves, and
             the TASK_SLUG line).
           - "# Plan": ONLY the text between the "===PLAN START===" and
             "===PLAN END===" markers in the plan below. Strip a leading
             top-level "# ..." heading if present (the template already provides
             "# Plan"). Discard everything outside the markers.
           - Leave "# User comments", "# What was done", and
             "# How was done and tested" empty.
           - Frontmatter: set `priority: 1` (tasks are highest precedence). 
             Leave `datetime`, `location`,
             and `commits` blank — the human and the executor fill those later.

        3. Determine the slug from the "TASK_SLUG:" line in the task below.

        4. Run: mkdir -p "{{inputs.path_backlog}}"
           Then write the filled document to:
           {{inputs.path_backlog}}/task_<slug>.md
           (literal prefix "task_" followed by the slug, e.g. task_dark-mode.md).
           finally, delete the original task file from the inbox at {{inputs.path_task}}.

        Task:
        ---
        {{improve_task.output}}
        ---

        Plan:
        ---
        {{generate_plan.output}}
        ---

  - count_remaining:
      description: "Count .md tasks still in the inbox after this run and emit 'task_counter: N' so improve-all-tasks can stop at 0."
      tool: tool:bash
      depends_on: [store_task]
      task: |
        set -euo pipefail
        uv run --no-project "{{conduit_dir}}/scripts/count_tasks.py" "{{inputs.path_task}}"
